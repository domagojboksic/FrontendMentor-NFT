<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0"> <!-- displays site properly based on user's device -->

  <link rel="icon" type="image/png" sizes="32x32" href="./images/favicon-32x32.png">
  
  <title>Frontend Mentor | NFT preview card component</title>
  <link rel="stylesheet" href="styles/main.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@100..900&display=swap" rel="stylesheet">
</head>
<body>
  <div id="container">
    
    <main>
      <div class="image">
        <img src="images/image-equilibrium.jpg" alt="Image of the equilibrium nft">
        <img id="viewIcon" src="images/icon-view.svg" alt="">    
      </div>
      <h4>Equilibrium #3429</h4>
      <p>Our Equilibrium collection promotes balance and calm.</p>
      <div id="info">
        <div id="price">
          <img src="images/icon-ethereum.svg" alt="ethereum icon next to the price">
          <p>0.041 ETH</p>
        </div>
        <div id="time">
          <img src="images/icon-clock.svg" alt="icon of a clock">
          <p>3 days left</p>
        </div>
      </div>
    </main> 

    <footer>
      <img src="images/image-avatar.png" alt="profile picture of the creator">
      <p>Creation of <a href="">Jules Wyvern</a></p>
    </footer>
    
  </div>
</body>
</html>
